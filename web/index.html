<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CodeCADStudio</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
      #top { display: grid; grid-template-columns: 1fr 380px; gap: 10px; padding: 10px; height: 100vh; box-sizing: border-box; }
      #viewer { background: #111; border-radius: 10px; overflow: hidden; }
      #side { display: flex; flex-direction: column; gap: 10px; }
      textarea { width: 100%; height: 260px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
      button { padding: 10px 12px; border: 0; border-radius: 8px; cursor: pointer; }
      button:disabled { opacity: 0.5; cursor: default; }
      #log { white-space: pre-wrap; background: #f6f6f6; border-radius: 8px; padding: 8px; height: 240px; overflow: auto; font-size: 12px; }
      .row { display: flex; gap: 8px; }
      .row button { flex: 1; }
      .badge { font-size: 12px; padding: 2px 8px; border-radius: 999px; background: #eee; display: inline-block; }
    </style>

    <!-- Import map: make "three" resolvable in the browser (no bundler needed) -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="top">
      <div id="viewer"></div>

      <div id="side">
        <div>
          <span class="badge" id="status">idle</span>
        </div>

        <textarea id="code"></textarea>

        <div class="row">
          <button id="renderPreview">Render preview</button>
          <button id="renderFinal">Render final</button>
        </div>

        <div class="row">
          <button id="clearLog">Clear log</button>
        </div>

        <div id="log"></div>
      </div>
    </div>

    <script type="module" src="/web/main.js"></script>
  </body>
</html>
